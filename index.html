<html>
<body>
  <h1>Hello, World!</h1>
  <input type="text" id="pokemon-id" placeholder="Enter Pokemon ID" />
  <button onclick="buttonClicked(document.getElementById('pokemon-id').value)">Get Pokemon</button>
  <br />
  <p id="poke-name"></p>
  <img id="pokemon-image" src=""/>
  <p id="poke-type"></p>

  <script>
  function getJapaneseName(id) {
    return fetch(`https://pokeapi.co/api/v2/pokemon-species/${id}`)
      .then(response => response.json())
      .then(data => {
        const jaName = data.names.find(n => n.language.name === 'ja');
        if (jaName != null) {
          return jaName.name;
        } else {
          return "No name";
        }
      })
      .catch(error => console.error("Error:", error));
  }

  function getJapaneseType(typeName) {
    console.log(typeName);
    return fetch(`https://pokeapi.co/api/v2/type/${typeName}`)
      .then(response => response.json())
      .then(data => {
        const jaType = data.names.find(n => n.language.name === 'ja');
        return jaType ? jaType.name : typeName;
      });
  }

  async function buttonClicked(id) {
    // ポケモン基本情報
    const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
    const data = await response.json();
    document.getElementById("pokemon-image").src = data.sprites.front_default;

    // 日本語名
    const speciesResponse = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${id}`);
    const speciesData = await speciesResponse.json();
    const jaName = speciesData.names.find(n => n.language.name === 'ja');
    document.getElementById("poke-name").textContent = jaName ? jaName.name : "No name";

    // タイプ（日本語）
    const typeNames = [];
    for (const t of data.types) {
      const typeResponse = await fetch(`https://pokeapi.co/api/v2/type/${t.type.name}`);
      const typeData = await typeResponse.json();
      const jaType = typeData.names.find(n => n.language.name === 'ja');
      typeNames.push(jaType ? jaType.name : t.type.name);
    }
    console.log(typeNames);
    document.getElementById("poke-type").textContent = typeNames.join(' / ');
  }
  </script>
</body>

</html>
