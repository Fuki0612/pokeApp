<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>POKÉDEX</title>
  <link href="./index.css" rel="stylesheet" />
</head>

<body>
  <header>
    <nav>
      <ul>
        <li><a href="/index.html" class="active">HOME</a></li>
        <li><a href="/games/shadow.html">SHADOW QUIZ</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <h1>POKÉDEX</h1>
    <p class="subtitle">National Pokédex</p>

    <div class="search-box">
      <input type="number" id="pokemon-id" placeholder="IDを入力（例: 25）" min="1" />
      <button onclick="buttonClicked(document.getElementById('pokemon-id').value)">検索</button>
    </div>

    <p class="loading-msg" id="loading-msg"></p>

    <div class="card" id="pokemon-card">
      <div class="card-header">
        <img id="pokemon-image" src="" alt="pokemon" />
        <div class="name-block">
          <p id="poke-name"></p>
          <div class="type-badges" id="type-badges"></div>
        </div>
        <span class="id-badge" id="poke-id"></span>
      </div>
      <div class="card-footer">
        <div class="dot"></div>
        <span>DATA FOUND</span>
      </div>
    </div>
  </main>

  <script src="./index.js"></script>
</body>

</html>
